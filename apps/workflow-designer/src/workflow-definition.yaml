name: workflow-designer
version: "5"
description: >
  Meta-workflow that turns a natural language idea into a complete
  Mediforce WorkflowDefinition. First design the steps, then choose
  how each step gets executed (human, AI agent, script). The result
  is a single registered WorkflowDefinition ready to run.

triggers:
  - name: manual
    type: manual

steps:
  - id: describe-idea
    name: Describe Workflow Idea
    type: creation
    description: >
      Describe the workflow you want to create in natural language.
      Include the goal, the steps involved, any review/approval loops,
      and triggers (manual, scheduled, webhook).
    params:
      - name: idea
        type: string
        required: true
        description: "Natural language description of the workflow to design"
      - name: workflowName
        type: string
        required: true
        description: "Machine-friendly name for the workflow (kebab-case, e.g. invoice-review)"

  - id: generate-steps
    name: Generate Steps
    type: creation
    description: >
      Generate workflow structure (steps, transitions, triggers) from
      the natural language description. Outputs YAML with step definitions,
      routing logic, and review loops — but no execution config yet.

  - id: review-steps
    name: Review Steps
    type: review
    description: >
      Review the generated workflow structure. Approve if the steps,
      transitions, and review loops match your intent. Revise to
      regenerate with feedback.
    verdicts:
      approve:
        target: describe-execution-preferences
      revise:
        target: generate-steps

  - id: describe-execution-preferences
    name: Describe Execution Preferences
    type: creation
    description: >
      Provide guidance for how steps should be executed. For example:
      which steps should always be human, preferred AI provider
      (Anthropic, DeepSeek), budget constraints, autonomy level,
      or any other execution preferences the agent should consider.
    params:
      - name: preferences
        type: string
        required: false
        description: "Execution preferences and constraints (optional — agent will propose defaults if empty)"

  - id: generate-execution-proposals
    name: Generate Execution Proposals
    type: creation
    description: >
      Generate 1-N execution proposals for the approved workflow
      structure. Each proposal assigns executor type, agent config,
      autonomy level, and plugin to every step. Proposals vary by
      automation strategy (e.g. all-human, hybrid, full-auto,
      budget-friendly). Outputs an options array for selection review.

  - id: review-execution
    name: Review Execution Proposals
    type: review
    description: >
      Review the proposed execution configurations. Select the one
      that best fits your needs, or revise to regenerate with
      different preferences.
    selection: 1
    verdicts:
      approve:
        target: validate
      revise:
        target: generate-execution-proposals

  - id: validate
    name: Validate WorkflowDefinition
    type: creation
    description: >
      Combine the approved steps with the selected execution config
      into a complete WorkflowDefinition and validate it against the
      WorkflowDefinitionSchema. Returns structured errors if invalid.

  - id: register
    name: Register WorkflowDefinition
    type: creation
    description: >
      Register the validated WorkflowDefinition in the Mediforce
      platform, making it available for starting new workflow runs.

  - id: done
    name: Done
    type: terminal

transitions:
  - from: describe-idea
    to: generate-steps
  - from: generate-steps
    to: review-steps
  # review-steps routes via verdicts
  - from: describe-execution-preferences
    to: generate-execution-proposals
  - from: generate-execution-proposals
    to: review-execution
  # review-execution routes via verdicts
  - from: validate
    to: register
    when: "output.valid == true"
  - from: validate
    to: generate-execution-proposals
    when: "output.valid == false"
  - from: register
    to: done
