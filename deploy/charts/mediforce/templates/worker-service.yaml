{{- if .Values.worker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mediforce.fullname" . }}-worker
  labels:
    {{- include "mediforce.componentLabels" (dict "context" . "component" "worker") | nindent 4 }}
spec:
  type: {{ .Values.worker.service.type }}
  ports:
    - name: http
      port: {{ .Values.worker.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "mediforce.componentSelectorLabels" (dict "context" . "component" "worker") | nindent 4 }}
{{- end }}
