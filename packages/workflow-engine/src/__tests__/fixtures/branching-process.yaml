name: branching-process
version: "1.0"
description: Process with gate-driven branch
steps:
  - id: start
    name: Start
    type: creation
  - id: path-a
    name: Path A
    type: creation
  - id: path-b
    name: Path B
    type: creation
  - id: done
    name: Done
    type: terminal
transitions:
  - from: start
    to: path-a
    gate: route-decision
  - from: start
    to: path-b
    gate: route-decision
  - from: path-a
    to: done
  - from: path-b
    to: done
triggers:
  - type: manual
    name: Start Branching
