name: pharmaverse-governance
title: Pharmaverse Semiannual Package Governance Review
description: Automated Track B semiannual review cycle for pharmaverse packages. Discovers all R packages in the pharmaverse GitHub org, collects maintenance and quality metrics, assesses each package against governance criteria, produces a council-ready summary report, generates per-package HTML reports, and notifies maintainers.
preamble: |-
  ## Domain Context

  This workflow implements the pharmaverse Package Governance Working Model v1.2 — specifically Track B (Semiannual Review Cycle). All assessments reference stable criteria IDs from the governance specification.

  ### Status Tags (one per package, reviewed semiannually)

  - **Stable** (ST-1..ST-5): Settled API, actively maintained, quality badges active. User signal: "Safe to adopt."
  - **Maturing** (MA-1..MA-5): Under active development, approved via RFC. Submission-Suitability not assessed. Must achieve Quality Reviewed within 12 months. User signal: "Assess fit carefully."
  - **Watch** (WA-1..WA-4): Documented concern raised, placed by majority vote. 30-day appeal window. User signal: "Use with caution."
  - **At Risk** (AR-1..AR-5): Failing standards after ≥1 Watch quarter. Remediation plan required within 1 quarter. User signal: "Avoid for new work."
  - **Archived** (AV-1..AV-4): Endorsement withdrawn. Automatic (no plan by next review) or direct (2/3 supermajority). User signal: "Do not use."

  ### Quality Badges (three independent dimensions)

  **Dimension 1 — Submission Readiness** (Stable only):
  - Submission-Suitable (SS-1..SS-4): Validation artifacts, CDISC compliance, stability/versioning, regulatory context
  - Submission-Caution (SC-1..SC-3): Unvalidated, dependency risks, regulatory grey areas

  **Dimension 2 — Maintenance Health** (all packages):
  - Actively Maintained (AM-1..AM-5): Critical issues ≤30d, non-critical ≤90d, ≥1 release/term, 2-quarter deprecation notice
  - Low Maintenance (LM-1..LM-4): Response times exceed thresholds, no releases, unresponsive

  **Dimension 3 — Technical Quality** (all packages):
  - Quality Reviewed (QR-0..QR-4): R CMD check clean, coverage ≥70%, vignettes, maintainable code, documentation current
  - Review Pending (RP-1..RP-3): Expected for Maturing; concern if long-standing for Stable

  ### Renewal Triggers
  - RT-1: 18-month calendar limit
  - RT-2: Major version release (breaking API change)
  - RT-3: Council-initiated (credible concerns)

  ### Decision Thresholds (quorum = 60% present)
  - New package approval: majority
  - Watch placement/removal: majority
  - At Risk: majority (after ≥1 Watch quarter)
  - Archived direct: 2/3 supermajority

  All medical/pharmaceutical terminology in this workflow refers to R package metadata and governance criteria — not patient data.
triggers:
- name: semiannual-review
  type: cron
  schedule: 0 8 1 1,7 *
- name: manual
  type: manual
roles:
- council-member
- governance-lead
env:
  GITHUB_TOKEN: '{{GITHUB_TOKEN}}'
steps:
- id: discover-packages
  name: Discover Pharmaverse Packages
  type: creation
  executor: script
  plugin: script-container
  description: 'Call GitHub API to list all repos in the pharmaverse org. Filter to R packages. Extract maintainer name and email from DESCRIPTION files. Output: list of package names with repo metadata, maintainer info.'
  env:
    GITHUB_TOKEN: '{{GITHUB_TOKEN}}'
  script:
    runtime: javascript
    image: mediforce-golden-image
    inlineScript: |-
      import { writeFile } from "node:fs/promises";
      const REGISTRY_REPO = "pharmaverse/pharmaverse";
      const REGISTRY_BRANCH = "develop";
      const PACKAGES_PATH = "data/packages";
      const CONCURRENCY_LIMIT = 5;
      function githubHeaders() {
        const token = process.env.GITHUB_TOKEN;
        const headers = {
          Accept: "application/vnd.github.v3+json",
          "User-Agent": "mediforce-pharmaverse-governance"
        };
        if (token) {
          headers.Authorization = `Bearer ${token}`;
        }
        return headers;
      }
      async function githubFetch(url) {
        const response = await fetch(url, { headers: githubHeaders() });
        const remaining = response.headers.get("X-RateLimit-Remaining");
        if (remaining !== null && parseInt(remaining, 10) < 100) {
          const reset = response.headers.get("X-RateLimit-Reset");
          const resetTime = reset ? new Date(parseInt(reset, 10) * 1e3).toISOString() : "unknown";
          console.warn(`WARNING: GitHub rate limit low \u2014 ${remaining} remaining (resets at ${resetTime})`);
        }
        return response;
      }
      function parseYaml(text) {
        const fields = {};
        let currentKey = null;
        let currentValue = "";
        for (const line of text.split("\n")) {
          if (currentKey !== null && /^\s+/.test(line)) {
            currentValue += " " + line.trim();
            continue;
          }
          if (currentKey !== null) {
            fields[currentKey] = currentValue.trim();
          }
          const match = line.match(/^([A-Za-z][A-Za-z0-9_.]*)\s*:\s*(.*)/);
          if (match) {
            currentKey = match[1];
            currentValue = match[2];
          } else {
            currentKey = null;
            currentValue = "";
          }
        }
        if (currentKey !== null) {
          fields[currentKey] = currentValue.trim();
        }
        return fields;
      }
      async function fetchPackageYaml(entryUrl) {
        const response = await githubFetch(entryUrl);
        if (!response.ok) {
          return null;
        }
        const data = await response.json();
        if (!data.content || data.encoding !== "base64") {
          return null;
        }
        const decoded = Buffer.from(data.content, "base64").toString("utf-8");
        return parseYaml(decoded);
      }
      async function fetchMaintainerInfo(repo) {
        const url = `https://api.github.com/repos/${repo}/contents/DESCRIPTION`;
        const response = await githubFetch(url);
        if (!response.ok) return { name: null, email: null };
        const data = await response.json();
        if (!data.content || data.encoding !== "base64") return { name: null, email: null };
        const content = Buffer.from(data.content, "base64").toString("utf-8");
        const maintainerMatch = content.match(/^Maintainer:\s*(.+)/m);
        if (maintainerMatch) {
          const raw = maintainerMatch[1].trim();
          const emailMatch = raw.match(/<([^>]+)>/);
          const email = emailMatch ? emailMatch[1] : null;
          const name = raw.replace(/<[^>]+>/, "").trim() || null;
          return { name, email };
        }
        const authorsBlock = content.match(/Authors@R:\s*([\s\S]*?)(?=\n[A-Z]|\n$)/);
        if (authorsBlock) {
          const creMatch = authorsBlock[1].match(/person\(\s*"([^"]+)"\s*,\s*"([^"]+)"[^)]*email\s*=\s*"([^"]+)"[^)]*role[^)]*"cre"/);
          if (creMatch) {
            return { name: `${creMatch[1]} ${creMatch[2]}`, email: creMatch[3] };
          }
        }
        return { name: null, email: null };
      }
      async function processInBatches(items, concurrency, fn) {
        const results = [];
        for (let i = 0; i < items.length; i += concurrency) {
          const batch = items.slice(i, i + concurrency);
          const batchResults = await Promise.all(batch.map(fn));
          results.push(...batchResults);
        }
        return results;
      }
      async function main() {
        console.log(`Discovering packages from ${REGISTRY_REPO} (${REGISTRY_BRANCH})...`);
        const dirUrl = `https://api.github.com/repos/${REGISTRY_REPO}/contents/${PACKAGES_PATH}?ref=${REGISTRY_BRANCH}`;
        const dirResponse = await githubFetch(dirUrl);
        if (!dirResponse.ok) {
          throw new Error(`Failed to list ${PACKAGES_PATH}: ${dirResponse.status} ${dirResponse.statusText}`);
        }
        const entries = await dirResponse.json();
        const yamlEntries = entries.filter((entry) => entry.name.endsWith(".yaml"));
        console.log(`Found ${yamlEntries.length} yaml files in registry`);
        const packages = [];
        await processInBatches(yamlEntries, CONCURRENCY_LIMIT, async (entry) => {
          const fields = await fetchPackageYaml(entry.url);
          if (fields === null) {
            console.warn(`  Skipped ${entry.name}: could not fetch`);
            return;
          }
          const name = fields.name ?? entry.name.replace(/\.yaml$/, "");
          const repo = fields.repo ?? "";
          const repoUrl = repo ? `https://github.com/${repo}` : "";
          let defaultBranch = "main";
          if (repo) {
            const repoResponse = await githubFetch(`https://api.github.com/repos/${repo}`);
            if (repoResponse.ok) {
              const repoData = await repoResponse.json();
              defaultBranch = repoData.default_branch ?? "main";
            }
          }
          const maintainer = repo ? await fetchMaintainerInfo(repo) : { name: null, email: null };
          packages.push({
            name,
            repo,
            repoUrl,
            defaultBranch,
            docs: fields.docs ?? "",
            task: fields.task ?? "",
            details: fields.details ?? "",
            maintainerName: maintainer.name,
            maintainerEmail: maintainer.email
          });
          console.log(`  ${name} (${repo}, branch: ${defaultBranch}, maintainer: ${maintainer.email ?? "unknown"})`);
        });
        packages.sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));
        const result = {
          packages,
          metadata: {
            registryRepo: REGISTRY_REPO,
            branch: REGISTRY_BRANCH,
            packageCount: packages.length,
            discoveredAt: (/* @__PURE__ */ new Date()).toISOString()
          }
        };
        await writeFile("/output/result.json", JSON.stringify(result, null, 2), "utf-8");
        console.log(`
      Done: ${packages.length} packages discovered`);
      }
      main().catch((error) => {
        console.error("Fatal error:", error);
        process.exit(1);
      });
- id: select-packages
  name: Select Packages to Review
  type: creation
  executor: human
  allowedRoles:
  - governance-lead
  - council-member
  description: Describe which pharmaverse packages to review this cycle. Free text, e.g. 'all packages', 'the admiral family', 'admiral, rhino', or 'all ADaM packages'. Say 'all' / 'everything' to review every discovered package. The next step resolves your description against the discovered list.
  params:
  - name: selection
    type: textarea
    required: true
    description: Which packages to review. Say 'all packages' for every discovered pharmaverse package, or name specific packages or families.
- id: resolve-package-selection
  name: Resolve Package Selection
  type: creation
  executor: agent
  autonomyLevel: L4
  plugin: claude-code-agent
  description: Interpret the reviewer's free-text selection against the discovered package list and produce the filtered set of packages to collect metrics for. 'all' / 'everything' resolves to the full discovered list.
  agent:
    image: mediforce-golden-image
    timeoutMinutes: 10
    prompt: |-
      ---
      name: resolve-package-selection
      description: Translate a human user's natural-language description of which pharmaverse packages to evaluate into a concrete filtered list of package objects.
      ---

      # Resolve Package Selection

      You are given two things:
      1. A full list of discovered pharmaverse packages (from the `discover-packages` step)
      2. A single free-text response from a human, describing which subset they want to evaluate in this governance review cycle

      Your job is to return a filtered list of packages matching the user's intent.

      ## Input

      Read `/output/input.json`. The relevant fields:

      - `steps["discover-packages"].packages` — array of `{ name, repo, repoUrl, defaultBranch, docs, task, details, maintainerName, maintainerEmail }`
      - `steps["select-packages"].selection` — the user's free-text response

      ## Interpretation guidelines

      Be **flexible and forgiving**. Accept all of the following kinds of input:

      | User input | Expected result |
      |---|---|
      | `admiral, rhino` | exactly those two |
      | `all admiral family` / `admiral*` / `admiral and its variants` | admiral, admiralmetabolic, admiralneuro, admiralonco, admiralophtha, admiralpeds, admiralvaccine |
      | `everything` / `all` / `all packages` | full list |
      | `all ADaM packages` / `the adam ones` | packages where `task` ~ "ADaM" (case-insensitive match on the `task` field) |
      | `all tlg` / `tlg stuff` | `task ~ "tlg"` / `task ~ "TLG"` |
      | `the admiral one and rhino please` | admiral + rhino |
      | Exact match of `repo` (e.g. `pharmaverse/cards`) | that package |
      | A typo like `admeral` | resolve to the closest match (admiral) if clearly intended |

      When the user lists items separated by commas, semicolons, slashes, "and", "+", or newlines — treat each as a separate entry.

      If input is genuinely ambiguous, **prefer to include more packages rather than fewer**. It is better to collect extra metrics than to silently drop one the user wanted.

      If the user's text is empty or can't be parsed at all, fall back to returning the full list (with an explanatory note in `selectionInterpretation`).

      ## Output

      Write `/output/result.json` with this exact shape (matching `discover-packages` for downstream compatibility):

      ```json
      {
        "packages": [
          { "name": "...", "repo": "...", "repoUrl": "...", "defaultBranch": "...", "docs": "...", "task": "...", "details": "...", "maintainerName": null, "maintainerEmail": null }
        ],
        "metadata": {
          "totalDiscovered": 20,
          "totalSelected": 7,
          "userInput": "... the original user selection text ...",
          "selectionInterpretation": "Plain-English explanation of how you parsed the request — e.g. 'Matched `all admiral family` to the 7 packages whose name starts with `admiral`.'",
          "unmatchedTokens": ["any tokens in user input that didn't map to any package"],
          "resolvedAt": "ISO-8601 timestamp"
        }
      }
      ```

      - Each entry in `packages` MUST be a full copy of the corresponding discover-packages entry — do not summarize fields.
      - The downstream `collect-metrics` step reads `packages[*].name`, `.repo`, `.repoUrl`, `.defaultBranch`; keep those intact.
    model: anthropic/claude-sonnet-4.5
  env:
    OPENROUTER_API_KEY: '{{OPENROUTER_API_KEY}}'
    ANTHROPIC_AUTH_TOKEN: '{{OPENROUTER_API_KEY}}'
    ANTHROPIC_BASE_URL: https://openrouter.ai/api
    ANTHROPIC_API_KEY: ''
- id: collect-metrics
  name: Collect Per-Package Metrics
  type: creation
  executor: script
  plugin: script-container
  description: For each selected package, collect governance properties, releases, issue response times, PR activity, CRAN checks, test coverage, vignette presence, documentation state, and contributor activity.
  env:
    GITHUB_TOKEN: '{{GITHUB_TOKEN}}'
  script:
    runtime: javascript
    image: mediforce-golden-image
    inlineScript: |-
      import { readFile, writeFile } from "node:fs/promises";
      let rateLimitRemaining = 5e3;
      let githubConcurrency = 3;
      function githubHeaders() {
        const token = process.env.GITHUB_TOKEN;
        const headers = {
          Accept: "application/vnd.github.v3+json",
          "User-Agent": "mediforce-pharmaverse-governance"
        };
        if (token) {
          headers.Authorization = `Bearer ${token}`;
        }
        return headers;
      }
      function updateRateLimit(response) {
        const remaining = response.headers.get("X-RateLimit-Remaining");
        if (remaining !== null) {
          rateLimitRemaining = parseInt(remaining, 10);
        }
      }
      async function pauseIfNeeded() {
        if (rateLimitRemaining < 50) {
          console.warn(`Rate limit critically low (${rateLimitRemaining}). Pausing for 60 seconds...`);
          await sleep(6e4);
        } else if (rateLimitRemaining < 200) {
          githubConcurrency = 1;
        }
      }
      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }
      async function githubFetch(url) {
        await pauseIfNeeded();
        const response = await fetch(url, { headers: githubHeaders() });
        updateRateLimit(response);
        return response;
      }
      async function withGithubConcurrency(tasks) {
        const results = new Array(tasks.length);
        let nextIndex = 0;
        async function worker() {
          while (nextIndex < tasks.length) {
            const index = nextIndex;
            nextIndex++;
            results[index] = await tasks[index]();
          }
        }
        const workers = [];
        const concurrency = Math.min(githubConcurrency, tasks.length);
        for (let i = 0; i < concurrency; i++) {
          workers.push(worker());
        }
        await Promise.all(workers);
        return results;
      }
      function monthsAgo(months) {
        const d = /* @__PURE__ */ new Date();
        d.setMonth(d.getMonth() - months);
        return d;
      }
      function daysAgo(days) {
        return new Date(Date.now() - days * 24 * 60 * 60 * 1e3);
      }
      function daysBetween(a, b) {
        return Math.abs(b.getTime() - a.getTime()) / (24 * 60 * 60 * 1e3);
      }
      function median(values) {
        if (values.length === 0) return null;
        const sorted = [...values].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        if (sorted.length % 2 === 0) {
          return (sorted[mid - 1] + sorted[mid]) / 2;
        }
        return sorted[mid];
      }
      function parseSemverMajor(tag) {
        const match = tag.replace(/^v/i, "").match(/^(\d+)/);
        return match ? parseInt(match[1], 10) : null;
      }
      async function collectGovernanceState(repo) {
        const url = `https://api.github.com/repos/${repo}/properties/values`;
        const response = await githubFetch(url);
        const defaultState = {
          governanceStatus: null,
          submissionReadiness: null,
          maintenanceHealth: null,
          technicalQuality: null,
          lastReviewDate: null,
          endorsementTermStart: null
        };
        if (!response.ok) {
          return defaultState;
        }
        const data = await response.json();
        const propertyMap = {
          "governance-status": "governanceStatus",
          "submission-readiness": "submissionReadiness",
          "maintenance-health": "maintenanceHealth",
          "technical-quality": "technicalQuality",
          "last-review-date": "lastReviewDate",
          "endorsement-term-start": "endorsementTermStart"
        };
        for (const prop of data) {
          const key = propertyMap[prop.property_name];
          if (key !== void 0) {
            defaultState[key] = prop.value ?? null;
