- id: review-notifications
  name: Review & Approve Notifications
  type: review
  executor: human
  allowedRoles:
  - governance-lead
  description: Review the generated per-package reports and approve sending notification emails to maintainers. Every reviewed package's maintainer is notified unless NOTIFY_PACKAGE_FILTER restricts it. Verify the email content and HTML report attachments before approving.
  verdicts:
    approve:
      target: notify-maintainers
    revise:
      target: generate-package-reports
- id: notify-maintainers
