        const descResponse = await githubFetch(descUrl);
        let usesRoxygen = false;
        if (descResponse.ok) {
          const data = await descResponse.json();
          if (data.content && data.encoding === "base64") {
            const content = Buffer.from(data.content, "base64").toString("utf-8");
