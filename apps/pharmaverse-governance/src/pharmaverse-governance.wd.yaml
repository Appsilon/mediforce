          } catch (error) {
            const errorMessage = error instanceof Error ? error.message : String(error);
            console.error(`  ${report.packageName}: failed \u2014 ${errorMessage}`);
            notifications.push({
              packageName: report.packageName,
              maintainerEmail,
              status: "failed",
              error: errorMessage
            });
          }
        }
        const totalSent = notifications.filter((n) => n.status === "sent").length;
        const totalFailed = notifications.filter((n) => n.status === "failed").length;
        const totalSkipped = notifications.filter((n) => n.status === "skipped").length;
        const output = {
          notifications,
          totalSent,
          totalFailed,
          totalSkipped,
          sentAt: (/* @__PURE__ */ new Date()).toISOString()
        };
        await writeFile("/output/result.json", JSON.stringify(output, null, 2), "utf-8");
        console.log(`
      Done: ${totalSent} sent, ${totalFailed} failed, ${totalSkipped} skipped`);
      }
      main().catch((error) => {
        console.error("Fatal error:", error);
        process.exit(1);
