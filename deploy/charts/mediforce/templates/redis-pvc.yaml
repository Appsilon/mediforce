{{- if and .Values.redis.enabled .Values.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mediforce.fullname" . }}-redis
  labels:
    {{- include "mediforce.componentLabels" (dict "context" . "component" "redis") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size }}
{{- end }}
