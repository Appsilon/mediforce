# Production Docker Compose for Mediforce platform.
#
# Prerequisites:
#   - Copy .env.example to .env and fill in secrets
#   - Build agent images separately (see scripts/build-agent-images.sh)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - platform-ui

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  platform-ui:
    build:
      context: .
      dockerfile: packages/platform-ui/Dockerfile
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        - NEXT_PUBLIC_FIREBASE_APP_ID=${NEXT_PUBLIC_FIREBASE_APP_ID}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - PLATFORM_API_KEY=${PLATFORM_API_KEY}
      - DOCKER_DEEPSEEK_API_KEY=${DOCKER_DEEPSEEK_API_KEY}
      - DOCKER_OPENROUTER_API_KEY=${DOCKER_OPENROUTER_API_KEY}
      - DOCKER_APP_BASE_URL=http://platform-ui:3000
      - MEDIFORCE_ROOT=/repo
    volumes:
      # Shared /tmp so temp dirs created by platform-ui are visible to agent containers
      - /tmp:/tmp
      # Mount repo so skill files (SKILL.md) and plugin dirs are accessible at runtime
      - .:/repo:ro
    depends_on:
      redis:
        condition: service_healthy

  agent-worker:
    build:
      context: .
      dockerfile: packages/agent-queue/Dockerfile.worker
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  caddy-data:
  caddy-config:
