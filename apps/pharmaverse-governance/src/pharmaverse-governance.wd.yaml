        return `<!DOCTYPE html>
      <html lang="en">
      <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Governance Report - ${escapeHtml(packageName)}</title>
        <style>
          * { box-sizing: border-box; margin: 0; padding: 0; }
