      async function fetchMaintainerInfo(repo) {
        const token = process.env.GITHUB_TOKEN;
        const headers = {
          Accept: "application/vnd.github.v3+json",
          "User-Agent": "mediforce-pharmaverse-governance"
        };
        if (token) headers.Authorization = `Bearer ${token}`;
        try {
          const response = await fetch(
            `https://api.github.com/repos/${repo}/contents/DESCRIPTION`,
            { headers }
          );
          if (!response.ok) return { name: null, email: null };
          const data = await response.json();
          if (!data.content || data.encoding !== "base64") return { name: null, email: null };
          const content = Buffer.from(data.content, "base64").toString("utf-8");
          const maintainerMatch = content.match(/^Maintainer:\s*(.+)/m);
          if (maintainerMatch) {
            const raw = maintainerMatch[1].trim();
            const emailMatch = raw.match(/<([^>]+)>/);
            return {
              name: raw.replace(/<[^>]+>/, "").trim() || null,
              email: emailMatch ? emailMatch[1] : null
            };
          }
        } catch {
        }
        return { name: null, email: null };
      }
      function statusColor(status) {
        const s = status.toLowerCase();
        if (s.includes("stable")) return "#22c55e";
        if (s.includes("maturing")) return "#3b82f6";
        if (s.includes("watch")) return "#f59e0b";
        if (s.includes("at-risk") || s.includes("at risk")) return "#ef4444";
        if (s.includes("archived")) return "#6b7280";
        return "#6b7280";
      }
      function buildNotificationPresentation(reportContents, reviewDate) {
