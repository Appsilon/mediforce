name: verdict-test
version: "1.0"
steps:
  - id: intake
    name: Intake
    type: creation
  - id: compliance-review
    name: Compliance Review
    type: review
    verdicts:
      approve:
        target: approved
      revise:
        target: intake
      reject:
        target: rejected
  - id: approved
    name: Approved
    type: terminal
  - id: rejected
    name: Rejected
    type: terminal
transitions:
  - from: intake
    to: compliance-review
  - from: compliance-review
    to: approved
  - from: compliance-review
    to: intake
  - from: compliance-review
    to: rejected
triggers:
  - type: manual
    name: Start Review
