{{- if and .Values.ui.enabled .Values.rbac.create .Values.ui.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mediforce.fullname" . }}-ui-job-spawner
  labels:
    {{- include "mediforce.componentLabels" (dict "context" . "component" "ui") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "mediforce.uiServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "mediforce.fullname" . }}-ui-job-spawner
  apiGroup: rbac.authorization.k8s.io
{{- end }}
