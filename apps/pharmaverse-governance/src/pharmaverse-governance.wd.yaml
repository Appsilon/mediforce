        <div class="action"><strong>{assignee}:</strong> {description}</div>
      </div>

      <!-- If ALL categories A and B are empty: -->
      <!-- <div class="all-clear">All blocking items resolved — ready for final approval.</div> -->

      </body>
      </html>
