name: Preview on comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  trigger:
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/deploy-preview') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X POST \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket

      - name: Resolve PR branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ref=$(gh pr view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --json headRefName -q .headRefName)
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Trigger Vercel deploy hook
        run: |
          curl -fsSL -X POST \
            "${{ secrets.VERCEL_DEPLOY_HOOK }}?ref=${{ steps.pr.outputs.ref }}"

      - name: Post status comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Preview deployment triggered for \`${{ steps.pr.outputs.ref }}\`. Check the Vercel check on this PR."
