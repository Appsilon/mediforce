  executor: human
  allowedRoles:
  - governance-lead
  description: Governance lead reviews the council summary. Revise with council decisions (e.g. 'admiral approved, rhino option A selected'). Approve when all action items are resolved to proceed to report generation.
  verdicts:
    approve:
      target: generate-package-reports
