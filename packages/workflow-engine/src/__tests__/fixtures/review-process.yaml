name: review-process
version: "1.0"
description: Review loop pattern with intentional cycle
steps:
  - id: draft
    name: Draft
    type: creation
  - id: review
    name: Review
    type: review
    verdicts:
      approve:
        target: approved
      revise:
        target: draft
      reject:
        target: rejected
  - id: approved
    name: Approved
    type: terminal
  - id: rejected
    name: Rejected
    type: terminal
transitions:
  - from: draft
    to: review
triggers:
  - type: manual
    name: Start Review
