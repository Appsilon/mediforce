name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Build & Push Docker Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: staging # staging.mediforce.ai
            ip_secret: STAGING_SERVER_IP
          # cdisc temporarily detached from auto-deploy until its own NextAuth
          # cutover is done (per-env Google OAuth client + ALLOWED_EMAIL_DOMAINS
          # + auth_users seed). Deploying the NextAuth code to cdisc before its
          # users are seeded would mint fresh uuids and orphan their data.
          # Tracking: #1014. Re-add this entry after the cdisc cutover:
          #   - target: cdisc # cdisc.mediforce.ai
          #     ip_secret: CDISC_SERVER_IP
    concurrency:
      group: deploy-${{ matrix.target }}
      cancel-in-progress: true

    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key deploy@${{ secrets[matrix.ip_secret] }} "/opt/mediforce/scripts/deploy-staging.sh $SHA"
