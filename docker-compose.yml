# Docker Compose for local development with BullMQ job queue.
#
# Usage:
#   docker compose up redis        — start Redis only
#   docker compose up               — start Redis + agent worker
#
# The platform-ui dev server connects to Redis when REDIS_URL is set:
#   docker compose up -d && pnpm dev:queue

services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mediforce
      POSTGRES_PASSWORD: mediforce
      POSTGRES_DB: mediforce
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediforce -d mediforce"]
      interval: 5s
      timeout: 3s
      retries: 5

  bull-board:
    image: deadly0/bull-board
    ports:
      - "3100:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy

  container-worker:
    build:
      context: .
      dockerfile: packages/container-worker/Dockerfile.worker
    expose:
      - "3001"
    environment:
      - REDIS_URL=redis://redis:6379
      - WORKER_HTTP_PORT=3001
    volumes:
      # Worker needs Docker socket to spawn containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared /tmp so outputDir paths resolve on both host and worker
      - /tmp:/tmp
    depends_on:
      redis:
        condition: service_healthy

  # OTel trace viewer (ADR-0007). Receives OTLP HTTP on :6006 (/v1/traces)
  # and serves the UI on the same port. Enable export by setting
  # OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:6006 before `pnpm dev`.
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
    environment:
      - PHOENIX_WORKING_DIR=/mnt/data
    volumes:
      - phoenix-data:/mnt/data

volumes:
  postgres-data:
  phoenix-data:
