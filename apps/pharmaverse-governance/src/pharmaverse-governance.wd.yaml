        console.log(
          NOTIFY_FILTER.length > 0 ? `Processing ${filteredReports.length} of ${input.reports.length} reports (NOTIFY_PACKAGE_FILTER: ${NOTIFY_FILTER.join(", ")})` : `Processing all ${filteredReports.length} reports`
        );
        for (const report of filteredReports) {
          const pkg = packagesByName.get(report.packageName);
          const maintainerEmail = pkg?.maintainerEmail ?? null;
          const maintainerName = pkg?.maintainerName ?? report.packageName;
          if (!SENDGRID_API_KEY) {
            console.log(`  ${report.packageName}: skipped (SENDGRID_API_KEY not set)`);
            notifications.push({
              packageName: report.packageName,
              maintainerEmail,
              status: "skipped",
              error: "SENDGRID_API_KEY not set"
            });
            continue;
          }
          if (maintainerEmail === null) {
            console.log(`  ${report.packageName}: skipped (no maintainer email found)`);
            notifications.push({
              packageName: report.packageName,
              maintainerEmail: null,
              status: "skipped",
              error: "No maintainer email found"
            });
            continue;
          }
          try {
            const reportHtml = await readFile(report.htmlPath, "utf-8");
            const subject = `Pharmaverse Governance Report \u2014 ${report.packageName} \u2014 ${monthYear}`;
            const htmlBody = buildEmailHtml(maintainerName, report.packageName, monthYear);
            const reportFilename = `governance-report-${report.packageName}.html`;
            await sendEmail(maintainerEmail, subject, htmlBody, reportHtml, reportFilename);
            console.log(`  ${report.packageName}: sent to ${maintainerEmail}`);
            notifications.push({
              packageName: report.packageName,
              maintainerEmail,
              status: "sent",
              error: null
