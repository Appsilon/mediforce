          packageName: pkg.name,
          repo: pkg.repo,
          repoUrl: pkg.repoUrl,
          currentState,
          releases,
          issues,
          pullRequests,
          cranChecks,
          cranStatus,
          coverage,
          hasVignettes,
          documentation,
          contributors,
          collectedAt: now,
