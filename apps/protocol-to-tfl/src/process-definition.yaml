name: protocol-to-tfl
version: "3"
description: >
  Transform clinical trial protocol documents into production-ready
  Tables, Figures, and Listings (TFLs).

triggers:
  - name: manual
    type: manual

steps:
  - id: upload-documents
    name: Upload Documents
    type: creation
    description: Upload protocol PDF and SAP document
    ui:
      component: file-upload
      config:
        acceptedTypes:
          - application/pdf
        minFiles: 1
        maxFiles: 5

  - id: extract-metadata
    name: Extract Metadata
    type: creation
    description: Extract trial metadata from protocol and SAP documents

  - id: generate-tlg-shells
    name: Generate TLG Shells
    type: creation
    description: Generate mock TLG shell specifications from extracted trial metadata

  - id: upload-sdtm
    name: Upload SDTM
    type: creation
    description: Upload SDTM dataset files for ADaM derivation
    ui:
      component: file-upload
      config:
        acceptedTypes:
          - application/octet-stream
          - text/csv
        minFiles: 1
        maxFiles: 50

  - id: generate-adam
    name: Generate ADaM
    type: creation
    description: Derive ADaM datasets and R code from SDTM data, trial metadata, and TLG shells

  - id: generate-tlg
    name: Generate TLG
    type: creation
    description: Create final Tables, Figures, and Listings from ADaM datasets and TLG shells

  - id: done
    name: Done
    type: terminal

transitions:
  - from: upload-documents
    to: extract-metadata
  - from: extract-metadata
    to: generate-tlg-shells
  - from: generate-tlg-shells
    to: upload-sdtm
  - from: upload-sdtm
    to: generate-adam
  - from: generate-adam
    to: generate-tlg
  - from: generate-tlg
    to: done
