          }
        }
        return `
          <div class="section">
            <h2>Renewal Triggers</h2>
            <ul>${triggerList.map((t) => `<li>${t}</li>`).join("\n")}</ul>
            ${assessmentHtml}
          </div>`;
      }
      function generatePackageHtml(assessment, metrics, discoveredPkg, decision, reviewDate) {
