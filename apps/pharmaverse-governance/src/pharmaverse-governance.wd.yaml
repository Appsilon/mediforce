      ### Strict Rules

      1. **Use the CSS classes exactly as defined.** Do not invent new CSS classes or inline styles beyond what's in the template.
      2. **Stat cards are always a 6-column grid.** The CSS `.stats` uses `grid-template-columns: repeat(6, 1fr)`. This prevents wrapping. Do not change the grid.
      3. **Every `<details>` for a proposed change is COLLAPSED by default** (no `open` attribute). The user expands what they want to read.
      4. **Proposed Changes uses a CSS grid layout** (`.changes-grid`) with 7 columns. The header row (`.changes-col-headers`) and each package row (`.changes-row`) both use `display: contents` so all cells share the same column tracks. This ensures badges align perfectly across rows without wrapping.
      5. **Detail blocks** for each package are separate collapsed `<details>` elements placed AFTER the grid — not inside it. They contain evidence, criteria tables, and recommendations.
      6. **Maintenance details** table (releases, issues, PRs, response times) is always present inside each package detail block but wrapped in a nested collapsed `<details>`. This keeps the main view clean.
      7. **Do NOT include** sections called "Council Judgement", "Data Flags", "Data Quality Notes", or similar. If there are data gaps, note them briefly in the evidence section.
      8. **Action items have exactly three categories** with professional left-border accents — no emojis. Use `.actions-group.pre-decision`, `.actions-group.decisions`, `.actions-group.post-approval` classes. Each action item starts with `<strong>{assignee}:</strong>` to identify the responsible party.
      9. **No emojis anywhere** in the generated HTML. The report must look professional and clean.
      10. **The "All blocking items resolved" banner** only appears when categories A and B are both empty.

      ### Handling Revision Cycles

      When the input contains `verdict: "revise"` and a `comment`:

      1. Parse the comment for decisions
      2. Move decided items: change their badge from `b-pending` to `b-decided`, collapse their `<details>`
      3. Remove resolved items from action items categories A and B
      4. Add decisions to the Council Decisions section
      5. Update overview stat counts

      ## Rules

      - Keep language neutral and evidence-based
      - If data collection had errors, note briefly in evidence: "⚠ {metric}: collection failed"
      - Always show section headers even when empty (with `<p class="muted">None.</p>`)
      - HTML must be fully self-contained (no external resources)
      - Keep under 200KB

      ## Council Report Template

      # Council Report Template

      This is the expected structure for the semiannual governance review report.

      ## Meeting Agenda Structure

      The meeting follows the Track B structure from the governance model:

      1. **Consent Agenda (~5 min)** — Healthy packages ratified as-is. No discussion.
      2. **Proposed Tag Changes (~10 min each)** — Evidence presented, discussion, vote.
      3. **Renewal Assessments (~15 min each)** — Four-dimension assessment, discussion, vote.
      4. **Remediation Check-ins (~5 min each)** — Progress updates on packages with active remediation plans.
      5. **Early Warnings (~5 min)** — Informational, assign outreach.
      6. **Pipeline & Stewardship (~15 min)** — RFC status, upcoming renewals, proactive outreach assignments.

      ## Badge Abbreviation Key

      For compact display in tables:
      - **AM** = Actively Maintained
      - **LM** = Low Maintenance
      - **QR** = Quality Reviewed
      - **RP** = Review Pending
      - **SS** = Submission-Suitable
      - **SC** = Submission-Caution
      - **NA** = Not Assessed

      ## Vote Threshold Reference

      | Decision | Threshold | Quorum |
      |----------|-----------|--------|
      | Approve new package | Majority | 60% present |
      | Place on Watch | Majority | 60% present |
      | Remove Watch | Majority | 60% present |
      | Move to At Risk | Majority (after ≥1 Watch quarter) | 60% present |
      | Approve remediation plan | Majority | 60% present |
      | Renew endorsement | Majority | 60% present |
      | Archive from At Risk | Automatic (no plan) | N/A |
      | Archive direct | 2/3 supermajority | 60% present |

      ## Evidence Standards

      When presenting evidence for tag changes:
      - Always cite the specific criteria ID (e.g., AM-1, QR-0)
      - Include the threshold and the actual measured value
      - Include the time period for the measurement
      - Distinguish data-driven facts from interpretive assessments
