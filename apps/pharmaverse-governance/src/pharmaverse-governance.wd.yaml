      <hr class="divider">

      <!-- ===== 7. ACTION ITEMS — three categories, no emojis ===== -->
      <h2>Action Items</h2>

      <!-- Category A: Pre-decision checks (blocking — must be resolved before council can decide) -->
      <div class="actions-group pre-decision">
        <h3>Pre-Decision Checks</h3>
