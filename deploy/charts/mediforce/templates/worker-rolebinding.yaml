{{- if and .Values.worker.enabled .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mediforce.fullname" . }}-worker-job-spawner
  labels:
    {{- include "mediforce.componentLabels" (dict "context" . "component" "worker") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "mediforce.workerServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "mediforce.fullname" . }}-worker-job-spawner
  apiGroup: rbac.authorization.k8s.io
{{- end }}
