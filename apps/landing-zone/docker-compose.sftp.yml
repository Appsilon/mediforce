# Mock SFTP server for the landing-zone v0.1 demo.
#
# Single user `cro` with password `cro`. This is a LOCAL DEV CREDENTIAL ONLY —
# not a real secret. Real CRO endpoints (Hetzner staging) are v0.2+.
#
# The host directory studies/CDISCPILOT01/data/sftp-staging/ is mounted as
# the user's upload dir. Files dropped there appear on SFTP at /upload.
# Use scripts/seed_sftp.py to populate it from the demo variants.
#
# Bind on 127.0.0.1 only — do not expose this container to the network.
#
# Run from repo root:
#   docker compose -f apps/landing-zone/docker-compose.sftp.yml up -d
#   docker compose -f apps/landing-zone/docker-compose.sftp.yml down

services:
  sftp:
    image: atmoz/sftp:alpine
    container_name: landing-zone-sftp
    # cro:cro:1001 — username:password:uid. Same uid as the upload dir
    # owner so files dropped on the host are writable inside the container.
    command: cro:cro:1001
    ports:
      - "127.0.0.1:2222:22"
    volumes:
      - ./studies/CDISCPILOT01/data/sftp-staging:/home/cro/upload
    restart: unless-stopped
