name: E2E Tests

on:
  pull_request:
    paths:
      - 'packages/platform-ui/**'
      - 'packages/platform-core/**'
      - '.github/workflows/e2e-tests.yml'
  push:
    branches: [mediforce]
    paths:
      - 'packages/platform-ui/**'
      - 'packages/platform-core/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @mediforce/platform-ui exec playwright install --with-deps chromium

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase Emulators
        run: |
          cd packages/platform-ui
          firebase emulators:start --project demo-mediforce --only auth,firestore &
          sleep 10
          curl --retry 5 --retry-delay 2 --retry-connrefused http://127.0.0.1:9099/
          curl --retry 5 --retry-delay 2 --retry-connrefused http://127.0.0.1:8080/

      - name: Run E2E tests (smoke + authenticated)
        run: cd packages/platform-ui && NEXT_PUBLIC_USE_EMULATORS=true pnpm test:e2e:auth
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: fake-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-mediforce
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-mediforce.appspot.com
          FIREBASE_PROJECT_ID: demo-mediforce
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:fake'

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/platform-ui/playwright-report/
          retention-days: 14
