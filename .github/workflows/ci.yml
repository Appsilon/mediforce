name: CI

on:
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.claude/**'
      - 'agents/**'
      - 'skills/**'
      - '.planning/**'
      - 'LICENSE'
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.claude/**'
      - 'agents/**'
      - 'skills/**'
      - '.planning/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build custom Docker images for E2E tests
        run: docker build -t mediforce-node:latest -f packages/agent-runtime/container/Dockerfile.node .
      - run: pnpm test

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('packages/platform-ui/pnpm-lock.yaml', 'pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @mediforce/platform-ui exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @mediforce/platform-ui exec playwright install-deps chromium

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase Emulators
        working-directory: packages/platform-ui
        run: |
          firebase emulators:start --project demo-mediforce --only auth,firestore --config firebase.ci.json &
          sleep 10
          curl --retry 5 --retry-delay 2 --retry-connrefused http://127.0.0.1:9099/
          curl --retry 5 --retry-delay 2 --retry-connrefused http://127.0.0.1:8080/

      - name: Run E2E tests
        run: cd packages/platform-ui && NEXT_PUBLIC_USE_EMULATORS=true pnpm test:e2e:auth
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: fake-api-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-mediforce
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-mediforce.appspot.com
          FIREBASE_PROJECT_ID: demo-mediforce
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:fake'
          # Fake key for server-to-server auth between server actions and /api routes
          # (e.g. retryFailedStep → /api/processes/:id/run). Same value on both sides
          # of the self-fetch, so validateApiKey passes. Only used locally within
          # the Next.js process — no real secret needed.
          PLATFORM_API_KEY: ci-e2e-test-key

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/platform-ui/playwright-report/
          retention-days: 14

  supply-chain-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
      - name: Check for compromised axios versions
        run: |
          if grep -qE 'axios@(1\.14\.1|0\.30\.4)' pnpm-lock.yaml; then
            echo "::error::Compromised axios version detected!"
            exit 1
          fi
      - name: Check for known malicious packages
        run: |
          for pkg in plain-crypto-js; do
            if grep -q "${pkg}@" pnpm-lock.yaml; then
              echo "::error::Malicious package '$pkg' detected!"
              exit 1
            fi
          done
      - name: Install osv-scanner
        run: |
          curl -fsSL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
      - name: Audit dependencies (critical = block)
        run: |
          output=$(osv-scanner scan --lockfile=pnpm-lock.yaml 2>&1) || true
          echo "$output"
          if echo "$output" | grep -qP '[1-9]\d* Critical'; then
            echo "::error::Critical vulnerabilities found!"
            exit 1
          fi
      - name: Audit dependencies (full report)
        if: always()
        run: osv-scanner scan --lockfile=pnpm-lock.yaml || true

  gif-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check journey test changes have matching GIF updates
        run: cd packages/platform-ui && python3 scripts/check-gif-freshness.py ${{ github.event.pull_request.base.sha }}
